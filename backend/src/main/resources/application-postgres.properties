# Activated with: SPRING_PROFILES_ACTIVE=postgres
# (or run: ./mvnw spring-boot:run -Dspring-boot.run.profiles=postgres)

# --- PostgreSQL ---
spring.datasource.url=jdbc:postgresql://localhost:5432/marketplace
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=marketplace
spring.datasource.password=marketplace

# --- JPA / Hibernate ---
# 'update' keeps your data between restarts (unlike H2's create-drop).
# For real projects, prefer schema migrations (Flyway/Liquibase) over ddl-auto.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 console is meaningless against Postgres
spring.h2.console.enabled=false
