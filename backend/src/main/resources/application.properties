spring.application.name=furniture-marketplace

# --- H2 in-memory database ---
spring.datasource.url=jdbc:h2:mem:marketplace
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- H2 web console: http://localhost:8080/h2-console ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Mail: local SMTP catcher (Mailpit or MailHog) listening on localhost:1025 ---
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# the "from" address our notification emails use
app.mail.from=marketplace@example.com