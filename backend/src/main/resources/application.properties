spring.application.name=furniture-marketplace

# --- H2 in-memory database ---
spring.datasource.url=jdbc:h2:mem:marketplace
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- H2 web console: http://localhost:8080/h2-console ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Mail ---
# Defaults to a local SMTP catcher (Mailpit/MailHog on :1025). To deliver to a real
# inbox, export the MAIL_* env vars below (see Gmail App Password setup).
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:false}

# "from" must match the authenticated Gmail account (Gmail rewrites mismatched senders)
app.mail.from=${MAIL_FROM:marketplace@example.com}

# --- File uploads (furniture images) ---
# Local directory where uploaded images are stored; served at /images/uploads/**.
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=8MB